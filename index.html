<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SAMU-192 Interlocução Leste - Indicadores 2026</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      color-scheme: dark;
      --bg: #09111f;
      --bg-soft: #0f1b2d;
      --panel: #111d30;
      --panel-2: #142239;
      --panel-3: #182942;
      --border: rgba(148, 163, 184, .18);
      --border-strong: rgba(148, 163, 184, .30);
      --text: #eef4ff;
      --muted: #93a4bb;
      --muted-2: #687891;
      --blue: #4da3ff;
      --cyan: #3dd5f3;
      --green: #55d27a;
      --orange: #ff9b45;
      --purple: #b17cff;
      --pink: #f0629a;
      --danger: #fb7185;
      --shadow: 0 18px 50px rgba(0, 0, 0, .32);
      --radius: 8px;
    }

    * { 
      box-sizing: border-box; 
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 0%, rgba(77, 163, 255, .16), transparent 26rem),
        linear-gradient(180deg, #0b1525 0%, var(--bg) 46%, #07101d 100%);
      color: var(--text);
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden !important;
    }

    #root {
      width: 100%;
      overflow-x: hidden !important;
    }

    button, input, select {
      font: inherit;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    const LINK_PLANILHA_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRsBxeQ4oNTNvh64dbpf4Gv09QLvVClfVpTl255MCcVTVq4YQi1G17hTmU_6kjWNfUGwswHvW_oMPyt/pub?output=csv";

    // Fallback adaptado para a nova estrutura de colunas informada
    const DADOS_FALLBACK = [
      ["UNIDADE DE ATENDIMENTO", "DIURNO PAR", "DIURNO IMPAR", "NOTURNO PAR", "NOTURNO IMPAR", "TOTAL"],
      ["1158-2 SBV", 350, 310, 280, 274, 1214],
      ["1152-7 SBV-E", 300, 290, 270, 269, 1129],
      ["1091-6 SBV-E", 295, 285, 274, 260, 1114],
      ["1063-8 SBV-E", 290, 280, 270, 266, 1106],
      ["1157-8 SBV", 285, 277, 270, 265, 1097],
      ["1109-4 SBV", 280, 280, 270, 266, 1096],
      ["1088-3 SBV", 270, 267, 265, 265, 1067],
      ["1087-2 SBV", 265, 265, 264, 260, 1054],
      ["1076-1 SBV", 260, 260, 258, 257, 1035],
      ["1075-0 SBV", 260, 258, 258, 258, 1034],
      ["1107-2 SBV", 255, 255, 260, 255, 1025],
      ["1193-4 SBV", 255, 253, 260, 255, 1023],
      ["1090-5 SBV-E", 250, 250, 258, 250, 1008],
      ["1156-0 SBV", 250, 248, 250, 249, 997],
      ["1154-3 SBV", 248, 248, 250, 249, 995],
      ["1153-5 SBV", 245, 245, 244, 240, 974],
      ["1200-0 SBV", 245, 242, 245, 240, 972],
      ["1108-3 SBV-E", 230, 230, 228, 228, 916],
      ["1064-9 SBV", 220, 220, 219, 219, 878],
      ["1191-8 SBV-E", 215, 215, 218, 217, 865],
      ["1089-4 SBV", 215, 215, 216, 215, 861],
      ["1151-9 SAV", 215, 213, 214, 212, 854],
      ["1192-6 SBV", 200, 200, 202, 200, 802],
      ["1188-8 SBV", 192, 190, 190, 190, 762],
      ["1199-3 SBV", 186, 184, 183, 183, 736],
      ["1155-1 SAV", 180, 178, 176, 175, 709],
      ["OD11", 145, 144, 144, 143, 576],
      ["URAMS USP Leste", 125, 124, 124, 123, 496],
      ["URAMS ITAQUERA", 118, 117, 117, 117, 469],
      ["URAM J. TUPI", 106, 105, 105, 105, 421],
      ["URAMS RIO CLARO", 91, 90, 90, 90, 361],
      ["URAMS H. TIRADENTES", 86, 85, 85, 85, 341],
      ["URAM PB S. MIGUEL", 64, 63, 62, 62, 251],
      ["URAM JD HELENA", 56, 56, 56, 56, 224],
      ["URAMS S. MATEUS", 54, 54, 54, 54, 216]
    ];

    const PLANTÃO_COLORS = {
      "DIURNO": "#ff9b45",
      "NOTURNO": "#b17cff"
    };

    const normalizarChave = (valor) =>
      String(valor || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ")
        .trim();

    const limparNumero = (valor) => {
      if (valor === null || valor === undefined || valor === "") return 0;
      const texto = String(valor).replace(/\./g, "").replace(",", ".").trim();
      const num = Number(texto);
      return Number.isFinite(num) ? num : 0;
    };

    const formatarNumero = (valor) => Number(valor || 0).toLocaleString("pt-BR");

    function linhasParaObjetos(linhas) {
      if (!linhas || linhas.length < 2) return [];
      const [cabecalhos, ...corpo] = linhas;
      return corpo
        .filter((linha) => linha && linha.length > 0 && linha[0] !== null && linha[0] !== "")
        .map((linha) => Object.fromEntries(cabecalhos.map((cabecalho, indice) => [cabecalho, linha[indice]])));
    }

    function lerCampoPorNomes(item, nomesPossiveis) {
      const chaves = Object.keys(item);
      const nomes = nomesPossiveis.map(normalizarChave);
      const chaveEncontrada = chaves.find((chave) => nomes.includes(normalizarChave(chave)));
      return chaveEncontrada ? item[chaveEncontrada] : null;
    }

    function MiniBar({ value, max, color }) {
      const pct = max > 0 ? Math.max(2, (value / max) * 100) : 0;
      return (
        <div style={{ background: "rgba(148, 163, 184, .14)", borderRadius: 99, height: 7, width: "100%", overflow: "hidden" }}>
          <div style={{ width: `${pct}%`, background: color, height: "100%", borderRadius: 99, transition: "width .35s ease" }} />
        </div>
      );
    }

    function ChamadosCell({ value, max }) {
      const pct = max > 0 ? Math.max(4, (value / max) * 100) : 0;
      return (
        <div style={{ width: "100%" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, marginBottom: 6 }}>
            <strong style={{ fontSize: 14, color: "var(--text)" }}>{formatarNumero(value)}</strong>
            <span style={{ fontSize: 11, color: "var(--muted)" }}>{Math.round(pct)}%</span>
          </div>
          <div style={{ height: 7, borderRadius: 99, background: "rgba(148, 163, 184, .13)", overflow: "hidden" }}>
            <div style={{
              width: `${pct}%`,
              height: "100%",
              borderRadius: 99,
              background: "linear-gradient(90deg, var(--blue), var(--cyan))",
              boxShadow: "0 0 16px rgba(77, 163, 255, .35)"
            }} />
          </div>
        </div>
      );
    }

    function UnidadeMobileCard({ item, valorExibido, maxChamados }) {
      const pct = maxChamados > 0 ? Math.max(4, (valorExibido / maxChamados) * 100) : 0;
      return (
        <article className="mobile-unit-card">
          <div style={{ display: "flex", justifyContent: "space-between", gap: 12, alignMems: "flex-start" }}>
            <div style={{ minWidth: 0, flex: 1 }}>
              <div style={{ fontSize: 17, fontWeight: 850, color: "#dbeafe", lineHeight: 1.2, wordBreak: "break-word" }}>{item.unidade}</div>
              <div style={{ display: "flex", flexWrap: "wrap", alignItems: "center", gap: 8, marginTop: 8 }}>
                <span style={{ fontSize: 11, color: "var(--muted)", fontWeight: 500 }}>
                  Total Real da VTR: {formatarNumero(item.totalReal)}
                </span>
              </div>
            </div>
            <div style={{ textAlign: "right", flexShrink: 0 }}>
              <div style={{ fontSize: 10, color: "var(--muted)", fontWeight: 800, letterSpacing: .5, textTransform: "uppercase" }}>Filtrado</div>
              <div style={{ fontSize: 19, fontWeight: 850, color: "var(--cyan)", lineHeight: 1.1 }}>{formatarNumero(valorExibido)}</div>
            </div>
          </div>
          <div style={{ marginTop: 12 }}>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "var(--muted)", marginBottom: 5 }}>
              <span>Volume no filtro atual</span>
              <span>{Math.round(pct)}%</span>
            </div>
            <div style={{ height: 6, borderRadius: 99, background: "rgba(148, 163, 184, .13)", overflow: "hidden" }}>
              <div style={{
                width: `${pct}%`,
                height: "100%",
                borderRadius: 99,
                background: "linear-gradient(90deg, var(--blue), var(--cyan))",
                boxShadow: "0 0 18px rgba(77, 163, 255, .36)"
              }} />
            </div>
          </div>
        </article>
      );
    }

    function Dashboard() {
      const [dados, setDados] = useState([]);
      const [carregando, setCarregando] = useState(true);
      
      // Novos estados dos filtros cruzados solicitados
      const [filtroPeriodo, setFiltroPeriodo] = useState("TOTAL"); // TOTAL, DIURNO, NOTURNO
      const [filtroEscala, setFiltroEscala] = useState("TODOS");   // TODOS, PAR, IMPAR
      
      const [busca, setBusca] = useState("");
      const [ordenar, setOrdenar] = useState("chamados_desc");
      const [activeTabMobile, setActiveTabMobile] = useState("lista");

      function mapearDadosPlanilha(linhas) {
        return linhas
          .map((item, index) => {
            const unidade = lerCampoPorNomes(item, ["unidade de atendimento", "unidade", "viatura"]);
            const diurnoPar = limparNumero(lerCampoPorNomes(item, ["diurno par"]));
            const diurnoImpar = limparNumero(lerCampoPorNomes(item, ["diurno impar", "diurno ímpar"]));
            const noturnoPar = limparNumero(lerCampoPorNomes(item, ["noturno par"]));
            const noturnoImpar = limparNumero(lerCampoPorNomes(item, ["noturno impar", "noturno ímpar"]));
            const totalReal = limparNumero(lerCampoPorNomes(item, ["total"]));

            return {
              id: `${String(unidade || "").trim()}-${index}`,
              unidade: String(unidade || "").trim(),
              diurnoPar,
              diurnoImpar,
              noturnoPar,
              noturnoImpar,
              totalReal: totalReal || (diurnoPar + diurnoImpar + noturnoPar + noturnoImpar)
            };
          })
          .filter((item) => item.unidade !== "");
      }

      useEffect(() => {
        setDados(mapearDadosPlanilha(linhasParaObjetos(DADOS_FALLBACK)));
        setCarregando(false);

        if (window.location.protocol !== "file:") {
          if (typeof Papa !== "undefined") {
            Papa.parse(LINK_PLANILHA_CSV, {
              download: true,
              header: true,
              skipEmptyLines: true,
              dynamicTyping: false,
              complete: (results) => {
                const atualizados = mapearDadosPlanilha(results.data || []);
                if (atualizados.length) setDados(atualizados);
              },
              error: () => {
                console.warn("Usando dados locais de fallback.");
              }
            });
          }
        }
      }, []);

      // Função centralizada para calcular o valor com base nos filtros de plantão selecionados
      const calcularValorFiltrado = React.useCallback((item) => {
        let escPar = true;
        let escImpar = true;
        if (filtroEscala === "PAR") escImpar = false;
        if (filtroEscala === "IMPAR") escPar = false;

        let soma = 0;
        if (filtroPeriodo === "TOTAL" || filtroPeriodo === "DIURNO") {
          if (escPar) soma += item.diurnoPar;
          if (escImpar) soma += item.diurnoImpar;
        }
        if (filtroPeriodo === "TOTAL" || filtroPeriodo === "NOTURNO") {
          if (escPar) soma += item.noturnoPar;
          if (escImpar) soma += item.noturnoImpar;
        }
        return soma;
      }, [filtroPeriodo, filtroEscala]);

      // Mapeamento dinâmico dos dados computados conforme os filtros selecionados
      const dadosCalculados = useMemo(() => {
        return dados.map(d => ({
          ...d,
          valorExibido: calcularValorFiltrado(d)
        }));
      }, [dados, calcularValorFiltrado]);

      const totalGeralCalculado = useMemo(() => dadosCalculados.reduce((s, d) => s + d.valorExibido, 0), [dadosCalculados]);
      const maxChamadosCalculado = useMemo(() => dadosCalculados.length ? Math.max(...dadosCalculados.map(d => d.valorExibido)) : 0, [dadosCalculados]);

      // Filtragem por input de busca e ordenação
      const filtrados = useMemo(() => {
        const termo = busca.trim().toLowerCase();
        let r = dadosCalculados.filter(d => {
          return !termo || d.unidade.toLowerCase().includes(termo);
        });

        const [campo, dir] = ordenar.split("_");
        r = [...r].sort((a, b) => {
          if (campo === "unidade") {
            return dir === "desc" ? b.unidade.localeCompare(a.unidade, "pt-BR", { numeric: true }) : a.unidade.localeCompare(b.unidade, "pt-BR", { numeric: true });
          }
          return dir === "desc" ? b.valorExibido - a.valorExibido : a.valorExibido - b.valorExibido;
        });
        return r;
      }, [dadosCalculados, busca, ordenar]);

      const totalFiltradoPesquisa = useMemo(() => filtrados.reduce((s, d) => s + d.valorExibido, 0), [filtrados]);

      // Distribuição dos Períodos para o Gráfico Lateral Informativo
      const resumoPeriodos = useMemo(() => {
        let dPar = 0, dImp = 0, nPar = 0, nImp = 0;
        dados.forEach(d => {
          dPar += d.diurnoPar; dImp += d.diurnoImpar;
          nPar += d.noturnoPar; nImp += d.noturnoImpar;
        });
        return {
          "DIURNO PAR": dPar,
          "DIURNO ÍMPAR": dImp,
          "NOTURNO PAR": nPar,
          "NOTURNO ÍMPAR": nImp,
          "DIURNO (TOTAL)": dPar + dImp,
          "NOTURNO (TOTAL)": nPar + nImp
        };
      }, [dados]);

      if (carregando) {
        return (
          <div style={{ display: "grid", placeItems: "center", minHeight: "100vh", color: "var(--text)" }}>
            <h3 style={{ margin: 0 }}>Carregando dados da nova planilha...</h3>
          </div>
        );
      }

      return (
        <div style={{ minHeight: "100vh", paddingBottom: 36, width: "100%" }}>
          <header className="dashboard-header">
            <div className="header-container">
              <div>
                <h1 className="main-title">
                  <span aria-hidden="true">🚑</span>
                  SAMU-192 INTERLOCUÇÃO LESTE
                </h1>
                <p className="subtitle">Indicadores por Plantões e Escalas</p>
              </div>
              <div className="total-box-card">
                <div className="total-box-label">TOTAL SELECIONADO</div>
                <div className="total-box-value">{formatarNumero(totalGeralCalculado)}</div>
              </div>
            </div>
          </header>

          <section className="kpi-grid-container">
            {[
              { label: "Unidades Ativas", val: dados.length, color: "var(--blue)" },
              { label: "Total Diurno", val: formatarNumero(resumoPeriodos["DIURNO (TOTAL)"]), color: "var(--orange)" },
              { label: "Total Noturno", val: formatarNumero(resumoPeriodos["NOTURNO (TOTAL)"]), color: "var(--purple)" },
              { label: "Maior Vol. do Filtro", val: formatarNumero(maxChamadosCalculado), color: "var(--cyan)" },
              { label: "Média p/ VTR (Filtro)", val: dados.length ? formatarNumero(Math.round(totalGeralCalculado / dados.length)) : 0, color: "var(--pink)" },
            ].map(k => (
              <div key={k.label} className="kpi-box-item" style={{ borderTop: `3px solid ${k.color}` }}>
                <div className="kpi-box-value" style={{ color: k.color }}>{k.val}</div>
                <div className="kpi-box-label">{k.label}</div>
              </div>
            ))}
          </section>

          <div className="mobile-tabs-container">
            <button className={`mobile-tab-btn ${activeTabMobile === 'lista' ? 'active' : ''}`} onClick={() => setActiveTabMobile('lista')}>
              Lista ({filtrados.length})
            </button>
            <button className={`mobile-tab-btn ${activeTabMobile === 'analise' ? 'active' : ''}`} onClick={() => setActiveTabMobile('analise')}>
              Distribuição Geral
            </button>
          </div>

          <main className="dashboard-main-content">
            <aside className={`desktop-sidebar-container ${activeTabMobile !== 'lista' ? 'mobile-visible-aside' : ''}`}>
              <section className={`content-card-panel sidebar-graph-card ${activeTabMobile === 'analise' ? 'force-show' : ''}`}>
                <div className="content-card-title">Volume Real por Plantão</div>
                <div style={{ padding: "14px 16px", display: "flex", flexDirection: "column", gap: 14 }}>
                  {[
                    { label: "Diurno Par", val: resumoPeriodos["DIURNO PAR"], col: "var(--orange)" },
                    { label: "Diurno Ímpar", val: resumoPeriodos["DIURNO ÍMPAR"], col: "var(--orange)" },
                    { label: "Noturno Par", val: resumoPeriodos["NOTURNO PAR"], col: "var(--purple)" },
                    { label: "Noturno Ímpar", val: resumoPeriodos["NOTURNO ÍMPAR"], col: "var(--purple)" },
                  ].map(p => {
                    const maxSoma = Math.max(resumoPeriodos["DIURNO PAR"], resumoPeriodos["DIURNO ÍMPAR"], resumoPeriodos["NOTURNO PAR"], resumoPeriodos["NOTURNO ÍMPAR"]);
                    return (
                      <div key={p.label}>
                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6, gap: 8 }}>
                          <span style={{ fontSize: 12, fontWeight: 700, color: "var(--text)" }}>{p.label}</span>
                          <span style={{ fontSize: 12, fontWeight: 800, color: p.col }}>{formatarNumero(p.val)}</span>
                        </div>
                        <MiniBar value={p.val} max={maxSoma} color={p.col} />
                      </div>
                    );
                  })}
                </div>
              </section>
            </aside>

            <section className={`main-data-table-panel ${activeTabMobile !== 'lista' ? 'mobile-hidden' : ''}`}>
              <div className="filter-grid-layout">
                <input className="native-input-field" placeholder="Buscar unidade de atendimento..." value={busca} onChange={e => setBusca(e.target.value)} />
                
                {/* Filtro do Período */}
                <select className="native-select-field" style={{ borderColor: "var(--orange)" }} value={filtroPeriodo} onChange={e => setFiltroPeriodo(e.target.value)}>
                  <option value="TOTAL">Diurno + Noturno</option>
                  <option value="DIURNO">Apenas Diurno</option>
                  <option value="NOTURNO">Apenas Noturno</option>
                </select>

                {/* Filtro da Escala */}
                <select className="native-select-field" style={{ borderColor: "var(--purple)" }} value={filtroEscala} onChange={e => setFiltroEscala(e.target.value)}>
                  <option value="TODOS">Par + Ímpar</option>
                  <option value="PAR">Apenas Dias Pares</option>
                  <option value="IMPAR">Apenas Dias Ímpares</option>
                </select>

                <select className="native-select-field" value={ordenar} onChange={e => setOrdenar(e.target.value)}>
                  <option value="chamados_desc">Mais chamados</option>
                  <option value="chamados_asc">Menos chamados</option>
                  <option value="unidade_asc">Unidade (A-Z)</option>
                  <option value="unidade_desc">Unidade (Z-A)</option>
                </select>
              </div>

              <div className="content-card-panel">
                <div className="summary-info-line">
                  <span>
                    Exibindo <strong style={{ color: "var(--text)" }}>{filtrados.length}</strong> unidades de atendimento 
                    <span style={{ color: "var(--muted-2)" }}> · </span>
                    Total no filtro: <strong style={{ color: "var(--cyan)" }}>{formatarNumero(totalFiltradoPesquisa)}</strong> chamados
                  </span>
                </div>

                <div className="desktop-table-wrapper">
                  <table className="desktop-native-table">
                    <thead>
                      <tr>
                        <th style={{ width: '55%', background: "rgba(15, 27, 45, .92)", padding: "12px 14px", fontWeight: 800, color: "#aebdd0", fontSize: 11, letterSpacing: .7, textTransform: "uppercase", borderBottom: "1px solid var(--border)", textAlign: "left" }}>Unidade de Atendimento</th>
                        <th style={{ width: '45%', background: "rgba(15, 27, 45, .92)", padding: "12px 14px", fontWeight: 800, color: "#aebdd0", fontSize: 11, letterSpacing: .7, textTransform: "uppercase", borderBottom: "1px solid var(--border)", textAlign: "left" }}>Chamados no Filtro Atual</th>
                      </tr>
                    </thead>
                    <tbody>
                      {filtrados.map((d, i) => (
                        <tr key={d.id} style={i % 2 === 1 ? { background: "rgba(255, 255, 255, .025)" } : undefined}>
                          <td style={{ padding: "14px 14px", borderBottom: "1px solid rgba(148, 163, 184, .10)", fontWeight: 850, color: "#dbeafe", verticalAlign: "middle" }}>
                            {d.unidade}
                          </td>
                          <td style={{ padding: "14px 14px", borderBottom: "1px solid rgba(148, 163, 184, .10)", verticalAlign: "middle" }}>
                            <ChamadosCell value={d.valorExibido} max={maxChamadosCalculado} />
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>

                <div className="mobile-card-list-view">
                  {filtrados.map((d) => (
                    <UnidadeMobileCard key={d.id} item={d} valorExibido={d.valorExibido} maxChamados={maxChamadosCalculado} />
                  ))}
                  {filtrados.length === 0 && (
                    <div className="mobile-empty-state" style={{ padding: 24, textAlign: "center", color: "var(--muted)" }}>Nenhum resultado encontrado.</div>
                  )}
                </div>
              </div>
            </section>
          </main>

          <style>{`
            /* CSS ESTRUTURAL E RESPONSIVO COMPLETO */
            .dashboard-header {
              padding: 24px 28px 18px;
              border-bottom: 1px solid var(--border);
              background: linear-gradient(135deg, rgba(17, 29, 48, .96), rgba(10, 22, 39, .92));
              box-shadow: 0 12px 40px rgba(0, 0, 0, .20);
            }
            .header-container {
              display: flex; justify-content: space-between; align-items: center; gap: 18px; flex-wrap: wrap;
            }
            .main-title { 
              display: flex; 
              align-items: center; 
              gap: 10px; 
              font-size: 22px; 
              font-weight: 850; 
              margin: 0; 
              white-space: nowrap; 
            }
            .subtitle { font-size: 13px; color: #9ec9ff; margin: 6px 0 0; }
            .total-box-card {
              background: rgba(61, 213, 243, 0.1); border: 1px solid rgba(61, 213, 243, 0.25);
              border-radius: var(--radius); padding: 10px 16px; text-align: right; min-width: 160px;
            }
            .total-box-label { font-size: 10px; color: #3dd5f3; font-weight: 800; letter-spacing: .8px; }
            .total-box-value { font-size: 25px; font-weight: 850; color: #eef4ff; }

            .kpi-grid-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; padding: 20px 28px; }
            .kpi-box-item {
              background: linear-gradient(180deg, rgba(20, 34, 57, .96), rgba(17, 29, 48, .96));
              border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; box-shadow: 0 12px 30px rgba(0, 0, 0, .18);
            }
            .kpi-box-value { font-size: 26px; font-weight: 850; line-height: 1; }
            .kpi-box-label { font-size: 12px; color: var(--muted); margin-top: 6px; font-weight: 600; }

            .dashboard-main-content { display: grid; grid-template-columns: 280px minmax(0, 1fr); gap: 20px; padding: 0 28px; }
            .desktop-sidebar-container { display: flex; flex-direction: column; gap: 16px; }
            
            .content-card-panel {
              background: rgba(17, 29, 48, .92); border: 1px solid var(--border); border-radius: var(--radius);
              box-shadow: var(--shadow); overflow: hidden; width: 100%;
            }
            .content-card-title {
              font-size: 11px; font-weight: 800; color: #b6c5d8; padding: 13px 16px 9px;
              border-bottom: 1px solid var(--border); letter-spacing: 1.1px; text-transform: uppercase;
            }

            .filter-grid-layout {
              background: rgba(17, 29, 48, .92); border: 1px solid var(--border); border-radius: var(--radius);
              box-shadow: var(--shadow); padding: 14px; margin-bottom: 14px; display: grid;
              grid-template-columns: minmax(200px, 1fr) 180px 180px 180px; gap: 10px; align-items: center;
            }
            .native-input-field {
              width: 100%; border: 1px solid var(--border-strong); border-radius: 7px; padding: 9px 12px;
              font-size: 13px; outline: none; color: var(--text); background: rgba(9, 17, 31, .84);
            }
            .native-select-field {
              width: 100%; border: 1px solid var(--border-strong); border-radius: 7px; padding: 9px 12px;
              font-size: 13px; color: var(--text); background: rgba(9, 17, 31, .84); outline: none; cursor: pointer;
            }
            .summary-info-line { padding: 11px 16px; border-bottom: 1px solid var(--border); color: var(--muted); font-size: 12px; }
            
            .desktop-table-wrapper { width: 100%; }
            .desktop-native-table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }

            .mobile-tabs-container { display: none; }
            .mobile-card-list-view { display: none; }

            @media (max-width: 980px) {
              .filter-grid-layout { grid-template-columns: repeat(2, 1fr) !important; }
            }

            @media (max-width: 860px) {
              .dashboard-header { padding: 16px 14px 14px !important; }
              .header-container { flex-direction: column !important; align-items: stretch !important; gap: 12px !important; }
              .main-title { font-size: 18px !important; font-weight: 800 !important; }
              .total-box-card { text-align: left !important; min-width: 100% !important; padding: 12px !important; }
              .total-box-value { font-size: 26px !important; }

              .kpi-grid-container {
                grid-template-columns: repeat(2, 1fr) !important;
                gap: 10px !important;
                padding: 12px 14px !important;
              }
              .kpi-box-item { padding: 14px 16px !important; }
              .kpi-box-item:last-child { grid-column: span 2; }
              .kpi-box-value { font-size: 24px !important; }

              .mobile-tabs-container {
                display: grid !important; grid-template-columns: repeat(2, 1fr); gap: 6px; padding: 0 14px; margin-bottom: 14px;
              }
              .mobile-tab-btn {
                background: rgba(17, 29, 48, 0.6); border: 1px solid var(--border); color: var(--muted);
                padding: 12px 4px; font-size: 13px; font-weight: 700; border-radius: 6px; cursor: pointer;
              }
              .mobile-tab-btn.active {
                background: var(--panel-3); color: var(--text); border-color: var(--blue);
              }

              .dashboard-main-content { grid-template-columns: 1fr !important; padding: 0 14px !important; }
              .desktop-sidebar-container { display: none !important; }
              .mobile-visible-aside { display: flex !important; flex-direction: column !important; width: 100% !important; }
              .sidebar-graph-card { display: none !important; }
              .sidebar-graph-card.force-show { display: block !important; }
              .mobile-hidden { display: none !important; }

              .filter-grid-layout { grid-template-columns: 1fr !important; gap: 8px !important; padding: 12px !important; }
              .native-select-field, .native-input-field { padding: 11px 12px !important; font-size: 14px !important; }

              .desktop-table-wrapper { display: none !important; }
              .mobile-card-list-view { display: flex !important; flex-direction: column !important; }
              
              .mobile-unit-card {
                border-bottom: 1px solid var(--border); padding: 16px; background: rgba(20, 34, 57, 0.4);
              }
              .mobile-unit-card:last-child { border-bottom: none; }
            }
          `}</style>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Dashboard />);
  </script>
</body>
</html>
