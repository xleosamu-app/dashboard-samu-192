    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 0%, rgba(77, 163, 255, .16), transparent 26rem),
        linear-gradient(180deg, #0b1525 0%, var(--bg) 46%, #07101d 100%);

      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
    }

    button, input, select {
      font: inherit;

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    const LINK_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRsBxeQ4oNTNvh64dbpf4Gv09QLvVClfVpTl255MCcVTVq4YQi1G17hTmU_6kjWNfUGwswHvW_oMPyt/pub?output=csv";

    const TIPO_COLORS = {
      "SBV": { bg: "rgba(85, 210, 122, .14)", text: "#7ee69b", border: "rgba(85, 210, 122, .42)" },
      "SBV-E": { bg: "rgba(77, 163, 255, .15)", text: "#8dc5ff", border: "rgba(77, 163, 255, .46)" },
      "SAV": { bg: "rgba(255, 155, 69, .15)", text: "#ffbd80", border: "rgba(255, 155, 69, .45)" },
      "URAM": { bg: "rgba(240, 98, 154, .14)", text: "#ff96bf", border: "rgba(240, 98, 154, .44)" },
      "OD": { bg: "rgba(177, 124, 255, .15)", text: "#c7a5ff", border: "rgba(177, 124, 255, .45)" },
      "DELEGADA": { bg: "rgba(250, 204, 21, .13)", text: "#fde68a", border: "rgba(250, 204, 21, .42)" },
    };

    const SUP_COLORS = {
      "ITAQUERA": "#4da3ff",
      "ITQUERA": "#4da3ff",
      "TIRADENTES": "#b17cff",
      "ITAIM": "#55d27a",
      "S.MATEUS": "#ff7a2f",
      "ERMELINO": "#f0629a",
    };

    const normalizarChave = (valor) =>
      String(valor || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ")
        .trim();

    const limparNumero = (valor) => {
      if (valor === null || valor === undefined || valor === "") return null;
      const texto = String(valor).replace(/\./g, "").replace(",", ".").trim();
      const numero = Number(texto);
      return Number.isFinite(numero) ? numero : null;
    };

    const formatarNumero = (valor) => Number(valor || 0).toLocaleString("pt-BR");
