<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SAMU-192 Interlocução Leste - Indicadores 2026</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      color-scheme: dark;
      --bg: #09111f;
      --bg-soft: #0f1b2d;
      --panel: #111d30;
      --panel-2: #142239;
      --panel-3: #182942;
      --border: rgba(148, 163, 184, .18);
      --border-strong: rgba(148, 163, 184, .30);
      --text: #eef4ff;
      --muted: #93a4bb;
      --muted-2: #687891;
      --blue: #4da3ff;
      --cyan: #3dd5f3;
      --green: #55d27a;
      --orange: #ff9b45;
      --purple: #b17cff;
      --pink: #f0629a;
      --danger: #fb7185;
      --shadow: 0 18px 50px rgba(0, 0, 0, .32);
      --radius: 8px;
    }

    * { 
      box-sizing: border-box; 
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 0%, rgba(77, 163, 255, .16), transparent 26rem),
        linear-gradient(180deg, #0b1525 0%, var(--bg) 46%, #07101d 100%);
      color: var(--text);
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden !important;
    }

    #root {
      width: 100%;
      overflow-x: hidden !important;
    }

    button, input, select {
      font: inherit;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    const LINK_PLANILHA_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRsBxeQ4oNTNvh64dbpf4Gv09QLvVClfVpTl255MCcVTVq4YQi1G17hTmU_6kjWNfUGwswHvW_oMPyt/pub?output=csv";

    const DADOS_FALLBACK = [
      ["TOTAL DE CHAMADOS", "VIATURA", "TIPO", "SUPERVISAO"],
      [1214, "1158-2", "SBV", "ITAIM"],
      [1129, "1152-7", "SBV-E", "ITAQUERA"],
      [1114, "1091-6", "SBV-E", "ITAIM"],
      [1106, "1063-8", "SBV-E", "TIRADENTES"],
      [1097, "1157-8", "SBV", "S.MATEUS"],
      [1096, "1109-4", "SBV", "S.MATEUS"],
      [1067, "1088-3", "SBV", "ITAQUERA"],
      [1054, "1087-2", "SBV", "ERMELINO"],
      [1035, "1076-1", "SBV", "S.MATEUS"],
      [1034, "1075-0", "SBV", "S.MATEUS"],
      [1025, "1107-2", "SBV", "ITAQUERA"],
      [1023, "1193-4", "SBV", "ITAIM"],
      [1008, "1090-5", "SBV-E", "ITAIM"],
      [997, "1156-0", "SBV", "TIRADENTES"],
      [995, "1154-3", "SBV", "ERMELINO"],
      [974, "1153-5", "SBV", "ITAIM"],
      [972, "1200-0", "SBV", "ITAQUERA"],
      [916, "1108-3", "SBV-E", "TIRADENTES"],
      [878, "1064-9", "SBV", "TIRADENTES"],
      [865, "1191-8", "SBV-E", "S.MATEUS"],
      [861, "1089-4", "SBV", "TIRADENTES"],
      [854, "1151-9", "SAV", "ITAQUERA"],
      [802, "1192-6", "SBV", "ERMELINO"],
      [762, "1188-8", "SBV", "ERMELINO"],
      [736, "1199-3", "SBV", "ERMELINO"],
      [709, "1155-1", "SAV", "ITAIM"],
      [576, "OD11", "OD", "TIRADENTES"],
      [496, "URAMS USP Leste", "URAM", "ERMELINO"],
      [469, "URAMS ITAQUERA", "URAM", "ITAQUERA"],
      [421, "URAM J. TUPI", "URAM", "ITAIM"],
      [361, "URAMS RIO CLARO", "URAM", "S.MATEUS"],
      [341, "URAMS H. TIRADENTES", "URAM", "TIRADENTES"],
      [251, "URAM PB S. MIGUEL", "URAM", "ITAIM"],
      [224, "URAM JD HELENA", "URAM", "ITAIM"],
      [216, "URAMS S. MATEUS", "URAM", "S.MATEUS"],
    ];

    const TIPO_COLORS = {
      "SBV": { bg: "rgba(85, 210, 122, .14)", text: "#7ee69b", border: "rgba(85, 210, 122, .42)" },
      "SBV-E": { bg: "rgba(77, 163, 255, .15)", text: "#8dc5ff", border: "rgba(77, 163, 255, .46)" },
      "SAV": { bg: "rgba(255, 155, 69, .15)", text: "#ffbd80", border: "rgba(255, 155, 69, .45)" },
      "URAM": { bg: "rgba(240, 98, 154, .14)", text: "#ff96bf", border: "rgba(240, 98, 154, .44)" },
      "OD": { bg: "rgba(177, 124, 255, .15)", text: "#c7a5ff", border: "rgba(177, 124, 255, .45)" },
      "DELEGADA": { bg: "rgba(250, 204, 21, .13)", text: "#fde68a", border: "rgba(250, 204, 21, .42)" },
    };

    const SUP_COLORS = {
      "ITAQUERA": "#4da3ff",
      "ITQUERA": "#4da3ff",
      "TIRADENTES": "#b17cff",
      "ITAIM": "#55d27a",
      "S.MATEUS": "#ff7a2f",
      "ERMELINO": "#f0629a",
    };

    const normalizarChave = (valor) =>
      String(valor || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ")
        .trim();

    const limparNumero = (valor) => {
      if (valor === null || valor === undefined || valor === "") return null;
      const texto = String(valor).replace(/\./g, "").replace(",", ".").trim();
      const num = Number(texto);
      return Number.isFinite(num) ? num : null;
    };

    const formatarNumero = (valor) => Number(valor || 0).toLocaleString("pt-BR");

    function linhasParaObjetos(linhas) {
      const [cabecalhos, ...corpo] = linhas;
      return corpo
        .filter((linha) => inline => valor !== null && valor !== undefined && valor !== "")
        .map((linha) => Object.fromEntries(cabecalhos.map((cabecalho, indice) => [cabecalho, linha[indice]])));
    }

    function lerCampoPorIndiceOuNome(item, indice, nomesPossiveis) {
      const chaves = Object.keys(item);
      const chavePorIndice = chaves[indice];
      const valorPorIndice = chavePorIndice ? item[chavePorIndice] : null;
      if (valorPorIndice !== null && valorPorIndice !== undefined && valorPorIndice !== "") {
        return valorPorIndice;
      }

      const nomes = nomesPossiveis.map(normalizarChave);
      const chaveEncontrada = chaves.find((chave) => nomes.includes(normalizarChave(chave)));
      return chaveEncontrada ? item[chaveEncontrada] : null;
    }

    function Badge({ tipo }) {
      const c = TIPO_COLORS[tipo] || { bg: "rgba(148, 163, 184, .14)", text: "#cbd5e1", border: "rgba(148, 163, 184, .35)" };
      return (
        <span style={{
          display: "inline-flex",
          alignItems: "center",
          minHeight: 24,
          background: c.bg,
          color: c.text,
          border: `1px solid ${c.border}`,
          borderRadius: 6,
          padding: "3px 10px",
          fontSize: 12,
          fontWeight: 800,
          letterSpacing: .2,
          whiteSpace: "nowrap"
        }}>
          {tipo || "N/I"}
        </span>
      );
    }

    function SupervisaoDot({ sup }) {
      const color = SUP_COLORS[sup] || "#94a3b8";
      return (
        <span style={{ display: "inline-flex", alignItems: "center", gap: 8 }}>
          <span style={{ width: 9, height: 9, borderRadius: "50%", background: color, boxShadow: `0 0 0 3px ${color}22`, flexShrink: 0 }} />
          <span style={{ fontWeight: 700, fontSize: 13, color: "var(--text)" }}>{sup || "N/I"}</span>
        </span>
      );
    }

    function UnidadeMobileCard({ item, maxChamados }) {
      const pct = maxChamados > 0 ? Math.max(4, (item.chamados / maxChamados) * 100) : 0;
      const supColor = SUP_COLORS[item.supervisao] || "#94a3b8";
      return (
        <article className="mobile-unit-card">
          <div style={{ display: "flex", justifyContent: "space-between", gap: 12, alignItems: "flex-start" }}>
            <div style={{ minWidth: 0, flex: 1 }}>
              <div style={{ fontSize: 18, fontWeight: 850, color: "#dbeafe", lineHeight: 1.2, wordBreak: "break-word" }}>{item.unidade}</div>
              <div style={{ display: "flex", flexWrap: "wrap", alignItems: "center", gap: 8, marginTop: 8 }}>
                <Badge tipo={item.tipo} />
                <span style={{ display: "inline-flex", alignItems: "center", gap: 6, color: "var(--text)", fontSize: 13, fontWeight: 700 }}>
                  <span style={{ width: 8, height: 8, borderRadius: "50%", background: supColor, boxShadow: `0 0 0 3px ${supColor}22` }} />
                  {item.supervisao || "N/I"}
                </span>
              </div>
            </div>
            <div style={{ textAlign: "right", flexShrink: 0 }}>
              <div style={{ fontSize: 10, color: "var(--muted)", fontWeight: 800, letterSpacing: .5, textTransform: "uppercase" }}>Chamados</div>
              <div style={{ fontSize: 20, fontWeight: 850, color: "var(--text)", lineHeight: 1.1 }}>{formatarNumero(item.chamados)}</div>
            </div>
          </div>
          <div style={{ marginTop: 12 }}>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "var(--muted)", marginBottom: 5 }}>
              <span>Volume relativo</span>
              <span>{Math.round(pct)}%</span>
            </div>
            <div style={{ height: 6, borderRadius: 99, background: "rgba(148, 163, 184, .13)", overflow: "hidden" }}>
              <div style={{
                width: `${pct}%`,
                height: "100%",
                borderRadius: 99,
                background: "linear-gradient(90deg, var(--blue), var(--cyan))",
                boxShadow: "0 0 18px rgba(77, 163, 255, .36)"
              }} />
            </div>
          </div>
        </article>
      );
    }

    function MiniBar({ value, max, color }) {
      const pct = max > 0 ? Math.max(2, (value / max) * 100) : 0;
      return (
        <div style={{ background: "rgba(148, 163, 184, .14)", borderRadius: 99, height: 7, width: "100%", overflow: "hidden" }}>
          <div style={{ width: `${pct}%`, background: color, height: "100%", borderRadius: 99, transition: "width .35s ease" }} />
        </div>
      );
    }

    function ChamadosCell({ value, max }) {
      const pct = max > 0 ? Math.max(4, (value / max) * 100) : 0;
      return (
        <div style={{ width: "100%" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, marginBottom: 6 }}>
            <strong style={{ fontSize: 14, color: "var(--text)" }}>{formatarNumero(value)}</strong>
            <span style={{ fontSize: 11, color: "var(--muted)" }}>{Math.round(pct)}%</span>
          </div>
          <div style={{ height: 7, borderRadius: 99, background: "rgba(148, 163, 184, .13)", overflow: "hidden" }}>
            <div style={{
              width: `${pct}%`,
              height: "100%",
              borderRadius: 99,
              background: "linear-gradient(90deg, var(--blue), var(--cyan))",
              boxShadow: "0 0 16px rgba(77, 163, 255, .35)"
            }} />
          </div>
        </div>
      );
    }

    function Dashboard() {
      const [dados, setDados] = useState([]);
      const [carregando, setCarregando] = useState(true);
      const [filtroSup, setFiltroSup] = useState("TODOS");
      const [filtroTipo, setFiltroTipo] = useState("TODOS");
      const [busca, setBusca] = useState("");
      const [ordenar, setOrdenar] = useState("chamados_desc");
      const [activeTabMobile, setActiveTabMobile] = useState("lista");

      function mapearDadosPlanilha(linhas) {
        return linhas
          .map((item, index) => {
            const chamados = limparNumero(lerCampoPorIndiceOuNome(item, 0, ["total de chamados", "chamados"]));
            const unidade = lerCampoPorIndiceOuNome(item, 1, ["viatura", "unidade", "unidade de atendimento"]);
            const tipo = lerCampoPorIndiceOuNome(item, 2, ["tipo", "complexidade"]);
            const supervisao = lerCampoPorIndiceOuNome(item, 3, ["supervisao", "supervisão", "regiao", "região"]);

            return {
              id: `${String(unidade || "").trim()}-${index}`,
              chamados,
              unidade: String(unidade || "").trim(),
              tipo: String(tipo || "").trim().toUpperCase(),
              supervisao: String(supervisao || "").trim().toUpperCase(),
            };
          })
          .filter((item) =>
            item.unidade &&
            item.chamados !== null &&
            Number.isFinite(item.chamados)
          );
      }

      useEffect(() => {
        setDados(mapearDadosPlanilha(linhasParaObjetos(DADOS_FALLBACK)));
        setCarregando(false);

        if (window.location.protocol !== "file:") {
          if (typeof Papa !== "undefined") {
            Papa.parse(LINK_PLANILHA_CSV, {
              download: true,
              header: true,
              skipEmptyLines: true,
              dynamicTyping: false,
              complete: (results) => {
                const atualizados = mapearDadosPlanilha(results.data || []);
                if (atualizados.length) setDados(atualizados);
              },
              error: () => {
                console.warn("Usando dados locais.");
              }
            });
          }
        }
      }, []);

      const supervisoes = useMemo(() => ["TODOS", ...Array.from(new Set(dados.map(d => d.supervisao).filter(Boolean))).sort()], [dados]);
      const tipos = useMemo(() => ["TODOS", ...Array.from(new Set(dados.map(d => d.tipo).filter(Boolean))).sort()], [dados]);
      const totalGeral = useMemo(() => dados.reduce((s, d) => s + d.chamados, 0), [dados]);
      const maxChamados = useMemo(() => dados.length ? Math.max(...dados.map(d => d.chamados)) : 0, [dados]);

      const filtrados = useMemo(() => {
        const termo = busca.trim().toLowerCase();
        let r = dados.filter(d => {
          const supOk = filtroSup === "TODOS" || d.supervisao === filtroSup;
          const tipoOk = filtroTipo === "TODOS" || d.tipo === filtroTipo;
          const buscaOk = !termo ||
            d.unidade.toLowerCase().includes(termo) ||
            String(d.chamados).includes(termo) ||
            d.tipo.toLowerCase().includes(termo) ||
            d.supervisao.toLowerCase().includes(termo);
          return supOk && tipoOk && buscaOk;
        });

        const [campo, dir] = ordenar.split("_");
        r = [...r].sort((a, b) => {
          if (campo === "unidade") {
            return dir === "desc" ? b.unidade.localeCompare(a.unidade, "pt-BR", { numeric: true }) : a.unidade.localeCompare(b.unidade, "pt-BR", { numeric: true });
          }
          return dir === "desc" ? b.chamados - a.chamados : a.chamados - b.chamados;
        });
        return r;
      }, [dados, filtroSup, filtroTipo, busca, ordenar]);

      const totalFiltrado = useMemo(() => filtrados.reduce((s, d) => s + d.chamados, 0), [filtrados]);
      const porSup = useMemo(() => {
        const map = {};
        dados.forEach(d => { map[d.supervisao] = (map[d.supervisao] || 0) + d.chamados; });
        return Object.entries(map).sort((a, b) => b[1] - a[1]);
      }, [dados]);
      const porTipo = useMemo(() => {
        const map = {};
        dados.forEach(d => { map[d.tipo] = (map[d.tipo] || 0) + d.chamados; });
        return Object.entries(map).sort((a, b) => b[1] - a[1]);
      }, [dados]);
      const maxSup = useMemo(() => porSup.length ? Math.max(...porSup.map(([, v]) => v)) : 0, [porSup]);

      if (carregando) {
        return (
          <div style={{ display: "grid", placeItems: "center", minHeight: "100vh", color: "var(--text)" }}>
            <h3 style={{ margin: 0 }}>Carregando dados...</h3>
          </div>
        );
      }

      return (
        <div style={{ minHeight: "100vh", paddingBottom: 36, width: "100%" }}>
          <header className="dashboard-header">
            <div className="header-container">
              <div>
                <h1 className="main-title">
                  <span aria-hidden="true">🚑</span>
                  SAMU-192 INTERLOCUÇÃO LESTE
                </h1>
                <p className="subtitle">Indicadores de Atendimento 2026</p>
              </div>
              <div className="total-box-card">
                <div className="total-box-label">TOTAL GERAL</div>
                <div className="total-box-value">{formatarNumero(totalGeral)}</div>
              </div>
            </div>
          </header>

          <section className="kpi-grid-container">
            {[
              { label: "Unidades", val: dados.length, color: "var(--blue)" },
              { label: "Supervisões", val: new Set(dados.map(d => d.supervisao)).size, color: "var(--purple)" },
              { label: "Tipos de VTR", val: new Set(dados.map(d => d.tipo)).size, color: "var(--green)" },
              { label: "Maior Vol.", val: formatarNumero(maxChamados), color: "var(--orange)" },
              { label: "Média p/ Unid.", val: dados.length ? formatarNumero(Math.round(totalGeral / dados.length)) : 0, color: "var(--pink)" },
            ].map(k => (
              <div key={k.label} className="kpi-box-item" style={{ borderTop: `3px solid ${k.color}` }}>
                <div className="kpi-box-value" style={{ color: k.color }}>{k.val}</div>
                <div className="kpi-box-label">{k.label}</div>
              </div>
            ))}
          </section>

          <div className="mobile-tabs-container">
            <button className={`mobile-tab-btn ${activeTabMobile === 'lista' ? 'active' : ''}`} onClick={() => setActiveTabMobile('lista')}>
              Lista ({filtrados.length})
            </button>
            <button className={`mobile-tab-btn ${activeTabMobile === 'supervisao' ? 'active' : ''}`} onClick={() => setActiveTabMobile('supervisao')}>
              Regiões
            </button>
            <button className={`mobile-tab-btn ${activeTabMobile === 'tipo' ? 'active' : ''}`} onClick={() => setActiveTabMobile('tipo')}>
              Tipos VTR
            </button>
          </div>

          <main className="dashboard-main-content">
            <aside className={`desktop-sidebar-container ${activeTabMobile !== 'lista' ? 'mobile-visible-aside' : ''}`}>
              <section className={`content-card-panel sidebar-graph-card ${activeTabMobile === 'supervisao' ? 'force-show' : ''}`}>
                <div className="content-card-title">Por Supervisão</div>
                <div style={{ padding: "14px 16px", display: "flex", flexDirection: "column", gap: 12 }}>
                  {porSup.map(([sup, val]) => (
                    <div key={sup}>
                      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6, gap: 8 }}>
                        <span style={{ fontSize: 13, fontWeight: 800, color: SUP_COLORS[sup] || "#cbd5e1" }}>{sup}</span>
                        <span style={{ fontSize: 13, fontWeight: 800, color: "var(--text)" }}>{formatarNumero(val)}</span>
                      </div>
                      <MiniBar value={val} max={maxSup} color={SUP_COLORS[sup] || "#94a3b8"} />
                    </div>
                  ))}
                </div>
              </section>

              <section className={`content-card-panel sidebar-graph-card ${activeTabMobile === 'tipo' ? 'force-show' : ''}`}>
                <div className="content-card-title">Por Tipo</div>
                <div style={{ padding: "14px 16px", display: "flex", flexDirection: "column", gap: 10 }}>
                  {porTipo.map(([tipo, val]) => (
                    <div key={tipo} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12 }}>
                      <Badge tipo={tipo} />
                      <span style={{ fontSize: 13, fontWeight: 800, color: "var(--text)" }}>{formatarNumero(val)}</span>
                    </div>
                  ))}
                </div>
              </section>
            </aside>

            <section className={`main-data-table-panel ${activeTabMobile !== 'lista' ? 'mobile-hidden' : ''}`}>
              <div className="filter-grid-layout">
                <input className="native-input-field" placeholder="Buscar viatura, tipo, região..." value={busca} onChange={e => setBusca(e.target.value)} />
                <select className="native-select-field" value={filtroSup} onChange={e => setFiltroSup(e.target.value)}>
                  {supervisoes.map(s => <option key={s}>{s === 'TODOS' ? 'Todas Regiões' : s}</option>)}
                </select>
                <select className="native-select-field" value={filtroTipo} onChange={e => setFiltroTipo(e.target.value)}>
                  {tipos.map(t => <option key={t}>{t === 'TODOS' ? 'Todos Tipos' : t}</option>)}
                </select>
                <select className="native-select-field" value={ordenar} onChange={e => setOrdenar(e.target.value)}>
                  <option value="chamados_desc">Mais chamados</option>
                  <option value="chamados_asc">Menos chamados</option>
                  <option value="unidade_asc">Viatura (A-Z)</option>
                  <option value="unidade_desc">Viatura (Z-A)</option>
                </select>
              </div>

              <div className="content-card-panel">
                <div className="summary-info-line">
                  <span>
                    <strong style={{ color: "var(--text)" }}>{filtrados.length}</strong> Unidades encontradas
                    <span style={{ color: "var(--muted-2)" }}> · </span>
                    <strong style={{ color: "var(--blue)" }}>{formatarNumero(totalFiltrado)}</strong> chamados
                  </span>
                </div>

                <div className="desktop-table-wrapper">
                  <table className="desktop-native-table">
                    <thead>
                      <tr>
                        <th style={{ width: '40%', background: "rgba(15, 27, 45, .92)", padding: "12px 14px", fontWeight: 800, color: "#aebdd0", fontSize: 11, letterSpacing: .7, textTransform: "uppercase", borderBottom: "1px solid var(--border)", textAlign: "left" }}>Unidade de Atendimento</th>
                        <th style={{ width: '15%', background: "rgba(15, 27, 45, .92)", padding: "12px 14px", fontWeight: 800, color: "#aebdd0", fontSize: 11, letterSpacing: .7, textTransform: "uppercase", borderBottom: "1px solid var(--border)", textAlign: "left" }}>Tipo</th>
                        <th style={{ width: '20%', background: "rgba(15, 27, 45, .92)", padding: "12px 14px", fontWeight: 800, color: "#aebdd0", fontSize: 11, letterSpacing: .7, textTransform: "uppercase", borderBottom: "1px solid var(--border)", textAlign: "left" }}>Supervisão</th>
                        <th style={{ width: '25%', background: "rgba(15, 27, 45, .92)", padding: "12px 14px", fontWeight: 800, color: "#aebdd0", fontSize: 11, letterSpacing: .7, textTransform: "uppercase", borderBottom: "1px solid var(--border)", textAlign: "left" }}>Chamados</th>
                      </tr>
                    </thead>
                    <tbody>
                      {filtrados.map((d, i) => (
                        <tr key={d.id} style={i % 2 === 1 ? { background: "rgba(255, 255, 255, .025)" } : undefined}>
                          <td style={{ padding: "12px 14px", borderBottom: "1px solid rgba(148, 163, 184, .10)", fontWeight: 850, color: "#dbeafe", verticalAlign: "middle" }}>{d.unidade}</td>
                          <td style={{ padding: "12px 14px", borderBottom: "1px solid rgba(148, 163, 184, .10)", verticalAlign: "middle" }}><Badge tipo={d.tipo} /></td>
                          <td style={{ padding: "12px 14px", borderBottom: "1px solid rgba(148, 163, 184, .10)", verticalAlign: "middle" }}><SupervisaoDot sup={d.supervisao} /></td>
                          <td style={{ padding: "12px 14px", borderBottom: "1px solid rgba(148, 163, 184, .10)", verticalAlign: "middle" }}><ChamadosCell value={d.chamados} max={maxChamados} /></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>

                <div className="mobile-card-list-view">
                  {filtrados.map((d) => (
                    <UnidadeMobileCard key={d.id} item={d} maxChamados={maxChamados} />
                  ))}
                  {filtrados.length === 0 && (
                    <div className="mobile-empty-state">Nenhum resultado encontrado.</div>
                  )}
                </div>
              </div>
            </section>
          </main>

          <style>{`
            /* CSS ESTRUTURAL E RESPONSIVO COMPLETO */
            .dashboard-header {
              padding: 24px 28px 18px;
              borderBottom: 1px solid var(--border);
              background: linear-gradient(135deg, rgba(17, 29, 48, .96), rgba(10, 22, 39, .92));
              box-shadow: 0 12px 40px rgba(0, 0, 0, .20);
            }
            .header-container {
              display: flex; justify-content: space-between; align-items: center; gap: 18px; flex-wrap: wrap;
            }
            .main-title { display: flex; align-items: center; gap: 10px; fontSize: 22px; fontWeight: 850; letterSpacing: .3px; margin: 0; }
            .subtitle { fontSize: 13px; color: "#9ec9ff"; margin: "6px 0 0"; color: #9ec9ff; }
            .total-box-card {
              background: rgba(77, 163, 255, .10); border: 1px solid rgba(77, 163, 255, .24);
              border-radius: var(--radius); padding: 10px 16px; text-align: right; min-width: 150px;
            }
            .total-box-label { font-size: 10px; color: #9ec9ff; font-weight: 800; letter-spacing: .8px; }
            .total-box-value { font-size: 25px; font-weight: 850; }

            .kpi-grid-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; padding: 20px 28px; }
            .kpi-box-item {
              background: linear-gradient(180deg, rgba(20, 34, 57, .96), rgba(17, 29, 48, .96));
              border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; boxShadow: 0 12px 30px rgba(0, 0, 0, .18);
            }
            .kpi-box-value { font-size: 28px; font-weight: 850; line-height: 1; }
            .kpi-box-label { font-size: 12px; color: var(--muted); margin-top: 6px; font-weight: 600; }

            .dashboard-main-content { display: grid; grid-template-columns: 260px minmax(0, 1fr); gap: 20px; padding: 0 28px; }
            .desktop-sidebar-container { display: flex; flex-direction: column; gap: 16px; }
            
            .content-card-panel {
              background: rgba(17, 29, 48, .92); border: 1px solid var(--border); border-radius: var(--radius);
              box-shadow: var(--shadow); overflow: hidden; width: 100%;
            }
            .content-card-title {
              font-size: 11px; font-weight: 800; color: #b6c5d8; padding: 13px 16px 9px;
              border-bottom: 1px solid var(--border); letter-spacing: 1.1px; text-transform: uppercase;
            }

            .filter-grid-layout {
              background: rgba(17, 29, 48, .92); border: 1px solid var(--border); border-radius: var(--radius);
              box-shadow: var(--shadow); padding: 14px; margin-bottom: 14px; display: grid;
              grid-template-columns: minmax(220px, 1fr) 160px 160px 180px; gap: 10px; align-items: center;
            }
            .native-input-field {
              width: 100%; border: 1px solid var(--border-strong); border-radius: 7px; padding: 9px 12px;
              font-size: 13px; outline: none; color: var(--text); background: rgba(9, 17, 31, .84);
            }
            .native-select-field {
              width: 100%; border: 1px solid var(--border-strong); border-radius: 7px; padding: 9px 12px;
              font-size: 13px; color: var(--text); background: rgba(9, 17, 31, .84); outline: none; cursor: pointer;
            }
            .summary-info-line { padding: 11px 16px; border-bottom: 1px solid var(--border); color: var(--muted); font-size: 12px; }
            
            .desktop-table-wrapper { width: 100%; }
            .desktop-native-table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }

            .mobile-tabs-container { display: none; }
            .mobile-card-list-view { display: none; }

            /* MEDIA QUERY AGRESSIVA PARA MOBILE - ACABA COM O TAMANHO PEQUENO */
            @media (max-width: 860px) {
              .dashboard-header { padding: 16px 14px 14px !important; }
              .header-container { flex-direction: column !important; align-items: stretch !important; gap: 12px !important; }
              .main-title { font-size: 18px !important; font-weight: 800 !important; }
              .total-box-card { text-align: left !important; min-width: 100% !important; padding: 12px !important; }
              .total-box-value { font-size: 26px !important; }

              /* KPIs empilhados em formato grande e legível */
              .kpi-grid-container {
                grid-template-columns: repeat(2, 1fr) !important;
                gap: 10px !important;
                padding: 12px 14px !important;
              }
              .kpi-box-item { padding: 14px 16px !important; }
              .kpi-box-item:last-child { grid-column: span 2; }
              .kpi-box-value { font-size: 24px !important; }

              /* Ativação das Abas Grandes de Navegação */
              .mobile-tabs-container {
                display: grid !important; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 0 14px; margin-bottom: 14px;
              }
              .mobile-tab-btn {
                background: rgba(17, 29, 48, 0.6); border: 1px solid var(--border); color: var(--muted);
                padding: 12px 4px; font-size: 13px; font-weight: 700; border-radius: 6px; cursor: pointer;
              }
              .mobile-tab-btn.active {
                background: var(--panel-3); color: var(--text); border-color: var(--blue);
              }

              /* Reestruturação do grid principal para virar coluna única */
              .dashboard-main-content { grid-template-columns: 1fr !important; padding: 0 14px !important; }
              .desktop-sidebar-container { display: none !important; }
              .mobile-visible-aside { display: flex !important; flex-direction: column !important; width: 100% !important; }
              .sidebar-graph-card { display: none !important; }
              .sidebar-graph-card.force-show { display: block !important; }
              .mobile-hidden { display: none !important; }

              /* Filtros empilhados perfeitamente */
              .filter-grid-layout { grid-template-columns: 1fr !important; gap: 8px !important; padding: 12px !important; }
              .native-select-field, .native-input-field { padding: 11px 12px !important; font-size: 14px !important; }

              /* Oculta a tabela que causava o bug do tamanho minúsculo e ativa a visualização em cartões */
              .desktop-table-wrapper { display: none !important; }
              .mobile-card-list-view { display: flex !important; flex-direction: column !important; }
              
              .mobile-unit-card {
                border-bottom: 1px solid var(--border); padding: 16px; background: rgba(20, 34, 57, 0.4);
              }
              .mobile-unit-card:last-child { border-bottom: none; }
            }
          `}</style>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Dashboard />);
  </script>
</body>
</html>
